<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Click Laser | Dashboard</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./style/rootMain.css">
    <link rel="stylesheet" href="./style/main.css">
    <link rel="stylesheet" href="./style/dashboard.css">

</head>

<body id="main_body">
    <header class="header-main">
        <div class="header-toggle-menu btn-local" id="btn-toggle-menu" role="button" aria-label="Abrir Menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="header-logo">
            <div class="logo" onclick="ui.tab(this, 's-home')">
                <span>CLICK</span>
                <span>LASER</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="header-theme theme-toggle" onclick="ui.toggleTheme()">

            </div>
            <div class="header-user">
                <div class="btn-local circle user-notifications btn-dialog-show"
                    onclick="ui.alternateDialogsBox('box-dialog-notifications')">
                    <i class="bi bi-bell"></i>
                </div>
                <div class="btn-local circle user-avatar btn-dialog-show"
                    onclick="ui.alternateDialogsBox('box-dialog-user')">
                    <span>A</span>
                </div>
            </div>
        </div>

    </header>
    <aside class="main-sidebar">
        <ul class="nav-menu">
            <li class="btn-local retangle btn-nav nav-item" id="btn-nav-jobs" onclick="ui.tab(this, 's-jobs')">Gravações
            </li>
            <li class="btn-local retangle btn-nav nav-item" id="btn-nav-sales" onclick="ui.tab(this, 's-sales')">Vendas
            </li>
            <li class="btn-local retangle btn-nav nav-item" id="btn-nav-creator" onclick="ui.tab(this, 's-creator')">
                Criador</li>
            <li class="btn-local retangle btn-nav nav-item" id="btn-nav-stock" onclick="ui.tab(this, 's-stock')">Estoque
            </li>
            <li class="btn-local retangle btn-nav nav-item" id="btn-nav-team" onclick="ui.tab(this, 's-team')">Equipe
            </li>
        </ul>
    </aside>
    <div class="dialog-box" id="box-dialog-notifications">
        <div class="dialog-box-header">
            <span>Notificações:</span>
            <button class="" onclick="">Ver todas</button>
        </div>
        <div class="notifications-list">
            <div class="notification-empty">
                <i class="bi bi-bell-slash"></i>
                <p>Sem notificações</p>
            </div>
        </div>
    </div>
    <div class="dialog-box" id="box-dialog-user">
        <div class="dialog-box-header">
            <span>Perfil:</span>
            <button class="btn-close""><i class=" bi bi-x-lg"></i></button>
        </div>
        <div class="user-info">
            <div class="user-avatar">
                <span>A</span>
            </div>
            <div class="user-name">
                <span title="Nome">Ares</span>
                <small title="Cargo">Admin</small>
            </div>
            <div class="user-actions">
                <button class="btn-local retangle" id="btn-user-settings">Editar Perfil</button>
                <button class="btn-local retangle" id="btn-user-logout" onclick="logout()">Fazer Logout</button>
            </div>
        </div>
    </div>
    <main id="main_sections_box">

    </main>

    <!-- Page Loader -->
    <div id="main_page_loader" class="page_loader">
        <div class="loader_content">
            <div class="spinner"></div>
            <p>Carregando...</p>
        </div>
    </div>

    <!-- Custom Dialogs -->
    <div class="custom-dialog-overlay" id="modal-custom-alert" style="z-index: 99999;">
        <div class="modal-container custom-dialog-box">
            <div class="modal-body custom-dialog-body">
                <div id="custom-alert-icon" class="custom-dialog-icon"></div>
                <h3 id="custom-alert-title" class="custom-dialog-title">Atenção</h3>
                <p id="custom-alert-message" class="custom-dialog-message"></p>
            </div>
            <div class="modal-footer custom-dialog-actions" style="justify-content: center;">
                <button type="button" class="btn_local bg-blue text-white dialog-btn-primary">Entendi</button>
            </div>
        </div>
    </div>

    <div class="custom-dialog-overlay" id="modal-custom-confirm" style="z-index: 99999;">
        <div class="modal-container custom-dialog-box">
            <div class="modal-body custom-dialog-body">
                <div class="custom-dialog-icon custom-icon-warning"><i class="bi bi-exclamation-triangle"></i></div>
                <h3 class="custom-dialog-title">Confirmação</h3>
                <p id="custom-confirm-message" class="custom-dialog-message"></p>
            </div>
            <div class="modal-footer custom-dialog-actions">
                <button type="button" class="btn_local dialog-btn-secondary"
                    id="custom-confirm-cancel">Cancelar</button>
                <button type="button" class="btn_local dialog-btn-danger" id="custom-confirm-ok">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="./script/dashboard_main.js"></script>
    <script src="./script/dashboard_ui.js"></script>

    <script>
        const auth_token = localStorage.getItem('auth_token');
        const userId = localStorage.getItem('user_id');
        async function startDashboard() {

            const headers = {
                'Authorization': `Bearer ${auth_token}`,
                'X-User-Id': userId,
                'Content-Type': 'application/json'
            };
            const config = { method: 'GET', headers };

            const response = await fetch(`/api/private/dashboard/start`, config);

            if (response.status >= 400) {
                sessionStorage.clear();
                localStorage.clear();
                window.location.href = '/dashLogin';
            } else {
                const data = await response.json();

                const sections_html = data.sections_html;
                const modals_html = data.modals_html;
                const pages_list_html = data.pages_list_html;
                const callback = data.callback;

                if (sections_html) {
                    document.getElementById('main_sections_box').innerHTML = sections_html
                }
                if (modals_html) {
                    document.getElementById('main_body').insertAdjacentHTML('beforeend', modals_html)
                }
                if (pages_list_html) {
                    document.querySelector('.nav-menu').innerHTML = pages_list_html
                }

                ui.init();
                if (document.getElementById('font-list')) ui.initAssetsPreview(document.getElementById('font-list'));
                if (document.getElementById('vector-list')) ui.initAssetsPreview(document.getElementById('vector-list'));
                ui.initJobCards();
                ui.initCopyHandlers();
                ui.toggleLoader(true)

            }
        }

        startDashboard();

    </script>
</body>

</html>
