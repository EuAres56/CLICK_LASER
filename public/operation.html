<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ordens de Serviço</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/style/operation.css" />

</head>

<body>

    <!-- HEADER -->

    <div class="page-header">

        <div class="header-left">

            <div class="title">
                Ordens de Serviço
            </div>

            <div class="subtitle">
                Controle de gravações e produção
            </div>

        </div>

        <div class="header-actions">

            <input type="date" class="date-input" id="filterDate">

            <button class="create-btn" onclick="openCreateModal()">
                <i class="fa-solid fa-plus"></i>
                Nova OS
            </button>

        </div>

    </div>


    <!-- GRID -->

    <div class="os-grid" id="osGrid"></div>


    <!-- =========================================================
MODAL - CRIAR / EDITAR OS
========================================================= -->

    <div class="os-modal-overlay" id="osModal">

        <div class="os-modal">

            <!-- HEADER -->

            <div class="os-modal-header">

                <div>
                    <h2 id="osModalTitle">
                        Nova Ordem de Serviço
                    </h2>

                    <p>
                        Crie ou edite uma OS rapidamente
                    </p>
                </div>

                <button class="os-close-btn" onclick="closeOSModal()">
                    ✕
                </button>

            </div>


            <!-- BODY -->

            <div class="os-modal-body">


                <!-- VENDEDOR -->

                <div class="os-form-grid">

                    <div class="os-input-group">

                        <label>
                            Nome do vendedor
                        </label>

                        <input type="text" id="osSeller" placeholder="Ex: João">

                    </div>

                </div>


                <!-- CLIENTE -->

                <div class="os-form-grid two-columns">

                    <div class="os-input-group">

                        <label>
                            Nome do cliente
                        </label>

                        <input type="text" id="osClient" placeholder="Nome do cliente">

                    </div>

                    <div class="os-input-group">

                        <label>
                            Contato
                        </label>

                        <input type="text" id="osContact" placeholder="WhatsApp">

                    </div>

                </div>


                <!-- TEXTO -->

                <div class="os-input-group">

                    <label>
                        Texto da gravação
                    </label>

                    <textarea id="osText" placeholder="Digite o texto..." oninput="updateOSFontPreviews()"></textarea>

                </div>


                <!-- FONTES -->

                <div class="os-section">

                    <div class="os-section-title">
                        Seleção de Fonte
                    </div>

                    <div class="os-fonts-grid" id="osFontsContainer"></div>

                </div>


                <!-- VETORES -->

                <div class="os-section">

                    <div class="os-section-title">
                        Vetores / Figuras
                    </div>


                    <!-- TABS -->

                    <div class="os-catalog-tabs" id="osCatalogTabs"></div>


                    <!-- GRID -->

                    <div class="os-vectors-grid" id="osVectorsGrid"></div>

                </div>

            </div>


            <!-- FOOTER -->

            <div class="os-modal-footer">

                <button class="os-cancel-btn" onclick="closeOSModal()">
                    Cancelar
                </button>

                <button class="os-save-btn" onclick="saveOS()">
                    Salvar OS
                </button>

            </div>

        </div>

    </div>


    <!-- DELETE -->

    <div class="modal" id="deleteModal">

        <div class="confirm-box">

            <div class="confirm-title">
                Deletar OS?
            </div>

            <div class="confirm-text">
                Essa ação não poderá ser desfeita.
            </div>

            <div class="confirm-actions">

                <button class="secondary-btn" onclick="closeDeleteModal()">
                    Cancelar
                </button>

                <button class="danger-btn" onclick="confirmDelete()">
                    Deletar
                </button>

            </div>

        </div>

    </div>


    <script src="script/operation_main.js"></script>

</body>

</html>
